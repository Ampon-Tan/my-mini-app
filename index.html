<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Digital Card</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f4f7f6; }
        .card-profile { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; margin-top: 50px; }
        .header-gradient { background: linear-gradient(45deg, #00b900, #009900); height: 120px; }
        #profilePic { width: 120px; height: 120px; border: 5px solid white; border-radius: 50%; margin-top: -60px; object-fit: cover; }
        .btn-line { background-color: #06C755; color: white; border-radius: 50px; padding: 10px 25px; border: none; transition: 0.3s; }
        .btn-line:hover { background-color: #05a346; transform: translateY(-2px); color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5 col-sm-10">
            <div class="card card-profile text-center">
                <div class="header-gradient"></div>
                <div class="card-body p-4">
                    <img id="profilePic" src="https://via.placeholder.com/150" alt="Profile">
                    <h2 id="userName" class="mt-3 fw-bold">Loading...</h2>
                    <p id="userStatus" class="text-muted">LINE Mini App Developer</p>
                    <hr>
                    
                    <div class="d-grid gap-3 mt-4">
                        <button class="btn btn-line shadow-sm" onclick="shareMe()">
                            <i class="bi bi-share"></i> ส่งนามบัตรนี้ให้เพื่อน
                        </button>
                        
                        <button class="btn btn-outline-dark rounded-pill" onclick="openMap()">
                            📍 ดูที่ตั้งสำนักงาน (Maps)
                        </button>

                        <button class="btn btn-link text-decoration-none text-muted mt-2" onclick="liff.closeWindow()">
                            ปิดหน้าต่างนี้
                        </button>
                    </div>
                </div>
            </div>
            <p class="text-center mt-4 text-muted small">Powered by Ampon's Mini App</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    async function main() {
        try {
            // ใส่ ID ของคุณให้ถูกต้อง
            await liff.init({ liffId: "2009708940-xxxxx" }); 

            if (liff.isLoggedIn()) {
                const profile = await liff.getProfile();
                
                // ตรวจสอบว่ามีข้อมูลส่งมาจริงไหมผ่าน console
                console.log(profile);

                document.getElementById("userName").innerText = profile.displayName;
                document.getElementById("profilePic").src = profile.pictureUrl;
                document.getElementById("profilePic").style.display = "block"; // มั่นใจว่าสั่งให้โชว์รูป
                
                if (profile.statusMessage) {
                    document.getElementById("userStatus").innerText = profile.statusMessage;
                }
            } else {
                liff.login();
            }
        } catch (err) {
            // ถ้ามี Error จะเด้งบอกทันที
            alert("LIFF Error: " + err.message);
        }
    }

    // ฟังก์ชันแชร์ข้อความ (Share Target Picker)
    async function shareMe() {
    try {
        // 1. เช็คก่อนว่า LIFF พร้อมทำงานไหม
        if (!liff.isLoggedIn()) {
            liff.login();
            return;
        }

        // 2. เช็คว่าเปิดสิทธิ์ shareTargetPicker ใน Console หรือยัง
        if (liff.isApiAvailable('shareTargetPicker')) {
            const result = await liff.shareTargetPicker([
                {
                    "type": "text",
                    "text": "ลองเล่นแอปใหม่ของผมดูครับ!"
                }
            ]);
            
            if (result) {
                console.log("แชร์สำเร็จ!");
            } else {
                console.log("User ยกเลิกการแชร์");
            }
        } else {
            // ถ้าเด้ง Alert นี้ แปลว่าลืมติ๊ก Scopes ใน LINE Developers ครับ
            alert("ฟีเจอร์แชร์ยังไม่ได้เปิดใช้งาน (Check Scopes in Console)");
        }
    } catch (error) {
        alert("เกิดข้อผิดพลาด: " + error.message);
    }
}

    // ฟังก์ชันเปิด Link ภายนอก
    function openMap() {
        liff.openWindow({
            url: "https://www.google.com/maps",
            external: true
        });
    }

    main();
</script>
</body>
</html>
